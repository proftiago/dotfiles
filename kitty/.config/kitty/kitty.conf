# ==============================
# KITTY CONFIG — TIAGO
# ==============================

# Fonte (igual ao Foot)
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Transparência (equivalente ao opacity 0.7 do Hyprland)
background_opacity 0.85
dynamic_background_color yes

# Blur (ativado via Hyprland, mas deixa aqui registrado)
background_blur 1

# Janela
hide_window_decorations yes
window_padding_width 38

# Cursor
cursor_shape beam
cursor_beam_thickness 1.5
cursor_blink_interval 0

# Shell
shell fish

# Importa cores do matugen (gerado automaticamente)
include ~/.config/kitty/colors.conf

# Scrollback
scrollback_lines 5000

# Performance
sync_to_monitor yes
