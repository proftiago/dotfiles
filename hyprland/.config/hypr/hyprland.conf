# ╔══════════════════════════════════════════════════╗
# ║         HYPRLAND — TIAGO CONFIGURAÇÃO            ║
# ║         Arch Linux · Intel UHD · Wayland         ║
# ╚══════════════════════════════════════════════════╝

source = ~/.config/hypr/colors.conf


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  ENVIRONMENT
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = NIXOS_OZONE_WL,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  AUTOSTART
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

exec-once = ~/.config/hypr/set-random-wallpaper.sh
exec-once = waybar
exec-once = mako
exec-once = nm-applet
exec-once = swayosd-server
exec-once = xdg-desktop-portal-hyprland
exec-once = ~/scripts/keylock-osd.sh
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  MONITOR & INPUT
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

monitor = ,preferred,auto,1

input {
    kb_layout          = br
    kb_variant         = abnt2
    follow_mouse       = 1
    sensitivity        = 0
    numlock_by_default = true

    touchpad {
        natural_scroll          = true
        disable_while_typing    = true
        tap-to-click            = true
        scroll_factor           = 1.0
    }
}



# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  LAYOUT GERAL
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

general {
    col.active_border   = $active_border_1 $active_border_2 45deg
    col.inactive_border = $inactive_border
    gaps_in             = 6
    gaps_out            = 12
    border_size         = 1
}


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  DECORAÇÃO
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

decoration {
    rounding           = 14
    active_opacity     = 0.92
    inactive_opacity   = 0.82
    fullscreen_opacity = 1.0
    dim_around         = 0.7
    dim_inactive       = false
    dim_strength       = 0.2

    blur {
        enabled           = true
        size              = 10
        passes            = 4
        new_optimizations = true
        xray              = false
        noise             = 0.018
        contrast          = 1.05
        brightness        = 0.85
        vibrancy          = 0.25
        vibrancy_darkness = 0.1
    }

    shadow {
        enabled        = true
        range          = 24
        render_power   = 3
        color          = $shadow_color
        color_inactive = $shadow_inactive
    }
}


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  ANIMAÇÕES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

animations {
    enabled = yes
    bezier  = glass, 0.25, 0.9, 0.1, 1.0

    animation = windows,    1, 3, glass, popin 80%
    animation = windowsOut, 1, 2, glass, popin 80%
    animation = fade,       1, 2, glass
    animation = workspaces, 1, 3, glass, slide
    animation = border,     1, 4, glass
}


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  MISC
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

misc {
    disable_hyprland_logo  = true
    force_default_wallpaper = 0
}


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  APLICATIVOS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

$terminal = kitty
$menu     = rofi -show drun -config ~/.config/rofi/compact.rasi
$browser  = google-chrome-stable


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  KEYBINDS — SISTEMA
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

bind = SUPER,       Return, exec,          $terminal
bind = SUPER,       SPACE,  exec,          $menu
bind = SUPER,       E,      exec,          $browser
bind = SUPER,       A,      exec,          kitty --title "yazi" yazi
bind = SUPER SHIFT, A,      exec,          thunar
bind = SUPER,       B,      exec,          blueman-manager
bind = SUPER,       W,      exec,          ~/scripts/wallpaper.sh
bind = SUPER,       Escape, exec,          ~/scripts/powermenu.sh
bind = SUPER,       K,      exec,          ~/scripts/keybinds.sh
bind = SUPER,       C,      exec,          ~/scripts/configs.sh
bind = SUPER,       Q,      killactive
bind = SUPER SHIFT, V,      togglefloating
bind = SUPER,       F,      fullscreen
bind = SUPER,       M,      exit
bind = SUPER,       T,      exec,          kitty --class kitty-btop -o initial_window_columns=120 -o initial_window_rows=35 -e btop
bind = SUPER,       V,      exec,          cliphist list | rofi -dmenu -config ~/.config/rofi/compact.rasi | cliphist decode | wl-copy
bind = SUPER,       P,      exec,          hyprpicker -a

# ── Foco ──────────────────────────────────────────
bind = SUPER, left,  movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up,    movefocus, u
bind = SUPER, down,  movefocus, d

# ── Workspaces ────────────────────────────────────
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5

# ── Mover janela para workspace ───────────────────
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5

# ── Mouse ─────────────────────────────────────────
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# ── Volume & Brilho ───────────────────────────────
bindle = , XF86AudioRaiseVolume,  exec, swayosd-client --output-volume raise
bindle = , XF86AudioLowerVolume,  exec, swayosd-client --output-volume lower
bindle = , XF86AudioMute,         exec, swayosd-client --output-volume mute-toggle
bindle = , XF86MonBrightnessUp,   exec, swayosd-client --brightness +5
bindle = , XF86MonBrightnessDown, exec, swayosd-client --brightness -5

# ── Screenshots ───────────────────────────────────────────
bind = ,        Print,       exec, grim ~/Pictures/Screenshots/$(date +%Y%m%d-%H%M%S).png
bind = SHIFT,   Print,       exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d-%H%M%S).png
bind = CTRL,    Print,       exec, grim -g "$(slurp)" - | wl-copy

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  REGRAS DE JANELA
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

windowrule2 = opacity 0.7 override 0.7 override, class:^(foot)$
windowrule = float on,           match:class kitty-btop
windowrule = size 1000 750,   match:class kitty-btop
windowrule = center on,          match:class kitty-btop
windowrule = animation popin, match:class kitty-btop

# ── Layer rules ───────────────────────────────────
layerrule = blur on,           match:namespace mako
layerrule = ignore_alpha 0.1,  match:namespace mako
layerrule = blur on,           match:namespace rofi
layerrule = dim_around on,     match:namespace rofi
layerrule = blur on,           match:namespace waybar
layerrule = ignore_alpha 0.1,  match:namespace waybar
layerrule = blur on,           match:namespace swayosd
layerrule = ignore_alpha 0.1,  match:namespace swayosd
layerrule = xray on,           match:namespace swayosd

# ── Gesture rules ───────────────────────────────────
gesture = 3, horizontal, workspace
gesture = 3, up, scale: 1.5, float
