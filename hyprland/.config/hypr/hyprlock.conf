# ── FUNDO ──────────────────────────────────────────────
background {
  monitor =
  path   = screenshot
  blur_size    = 8
  blur_passes  = 4
  noise        = 0.02
  contrast     = 0.9
  brightness   = 0.8
  vibrancy     = 0.2
  vibrancy_darkness = 0.1
}

# ── FOTO DE PERFIL ─────────────────────────────────────
image {
  monitor  =
  path     = /home/tiago/.face
  size     = 100
  rounding = -1
  border_size  = 3
  border_color = rgb(ffffff)
  position = 0, 120
  halign   = center
  valign   = center
}

# ── RELÓGIO ────────────────────────────────────────────
label {
  monitor =
  text     = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
  color    = rgba(255, 255, 255, 1.0)
  font_size = 90
  font_family = JetBrainsMono Nerd Font Bold
  position = 0, -20
  halign   = center
  valign   = center
}

# ── DATA ───────────────────────────────────────────────
label {
  monitor =
  text     = cmd[update:60000] echo "<span>$(date +"%A, %d de %B")</span>"
  color    = rgba(255, 255, 255, 0.85)
  font_size = 22
  font_family = JetBrainsMono Nerd Font
  position = 0, -120
  halign   = center
  valign   = center
}

# ── MENSAGEM DE BOAS VINDAS ────────────────────────────
label {
  monitor =
  text    = Bem-vindo, Tiago
  color   = rgba(255, 255, 255, 0.6)
  font_size = 14
  font_family = JetBrainsMono Nerd Font
  position = 0, -280
  halign   = center
  valign   = center
}

# ── CAMPO DE SENHA ─────────────────────────────────────
input-field {
  monitor =
  size     = 280, 52
  outline_thickness = 2
  dots_size         = 0.28
  dots_spacing      = 0.18
  dots_center       = true
  dots_rounding     = -1

  outer_color  = rgba(255, 255, 255, 0.15)
  inner_color  = rgba(255, 255, 255, 0.1)
  font_color   = rgba(255, 255, 255, 1.0)
  fade_on_empty = true

  placeholder_text = <i>Senha...</i>

  check_color  = rgba(255, 255, 255, 0.9)
  fail_color   = rgba(255, 80, 80, 0.9)
  fail_text    = <i>Senha incorreta</i>
  fail_transition = 300

  rounding = 14
  position = 0, -360
  halign   = center
  valign   = center
}
